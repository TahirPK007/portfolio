<svg xmlns="http://www.w3.org/2000/svg" width="360" height="760" viewBox="0 0 360 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF5F0"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8A5C"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
  </defs>

  <rect width="360" height="760" fill="url(#bg)"/>

  <!-- Status bar -->
  <text x="24" y="34" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#1A1A1A">9:41</text>
  <rect x="300" y="22" width="36" height="14" rx="3" fill="#1A1A1A" opacity="0.12"/>

  <!-- Header -->
  <text x="24" y="88" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#1A1A1A">QuickBite</text>
  <text x="24" y="112" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#666666">Deliver to Lahore</text>

  <!-- Search bar -->
  <rect x="24" y="132" width="312" height="44" rx="22" fill="#FFFFFF" stroke="#E8E8E8"/>
  <circle cx="46" cy="154" r="8" fill="none" stroke="#999999" stroke-width="2"/>
  <text x="62" y="159" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#999999">Search restaurants...</text>

  <!-- Categories -->
  <rect x="24" y="196" width="64" height="72" rx="16" fill="#FF6B35"/>
  <text x="56" y="228" font-family="Inter, system-ui, sans-serif" font-size="22" text-anchor="middle"><U</text>
  <text x="56" y="252" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Pizza</text>

  <rect x="100" y="196" width="64" height="72" rx="16" fill="#F8F8F8"/>
  <text x="132" y="228" font-family="Inter, system-ui, sans-serif" font-size="22" text-anchor="middle"><T</text>
  <text x="132" y="252" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Burgers</text>

  <rect x="176" y="196" width="64" height="72" rx="16" fill="#F8F8F8"/>
  <text x="208" y="228" font-family="Inter, system-ui, sans-serif" font-size="22" text-anchor="middle"><\</text>
  <text x="208" y="252" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Asian</text>

  <rect x="252" y="196" width="64" height="72" rx="16" fill="#F8F8F8"/>
  <text x="284" y="228" font-family="Inter, system-ui, sans-serif" font-size="22" text-anchor="middle">>W</text>
  <text x="284" y="252" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">Healthy</text>

  <!-- Section title -->
  <text x="24" y="304" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#1A1A1A">Featured</text>

  <!-- Featured card -->
  <rect x="24" y="320" width="312" height="180" rx="18" fill="url(#card)"/>
  <rect x="24" y="320" width="312" height="180" rx="18" fill="#000000" opacity="0.08"/>
  <text x="44" y="360" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF">Slice Heaven</text>
  <text x="44" y="382" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#FFFFFF" opacity="0.9"> 4.8  À  25-35 min  À  $2.99 delivery</text>
  <text x="44" y="410" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#FFFFFF" opacity="0.85">Wood-fired pizzas and Italian classics</text>
  <rect x="44" y="448" width="96" height="34" rx="17" fill="#FFFFFF"/>
  <text x="92" y="470" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#FF6B35" text-anchor="middle">Order now</text>

  <!-- Restaurant list card -->
  <rect x="24" y="520" width="312" height="92" rx="16" fill="#FFFFFF" stroke="#ECECEC"/>
  <rect x="36" y="532" width="68" height="68" rx="12" fill="#FFE8DC"/>
  <text x="70" y="576" font-family="Inter, system-ui, sans-serif" font-size="24" text-anchor="middle"><T</text>
  <text x="118" y="558" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#1A1A1A">Burger Lab</text>
  <text x="118" y="578" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666"> 4.6  À  20-30 min</text>
  <text x="118" y="596" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#FF6B35">From $8.99</text>

  <!-- Bottom tab bar -->
  <rect x="0" y="688" width="360" height="72" fill="#FFFFFF" stroke="#ECECEC"/>
  <text x="45" y="732" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#FF6B35" text-anchor="middle">Home</text>
  <text x="135" y="732" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999" text-anchor="middle">Search</text>
  <text x="225" y="732" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999" text-anchor="middle">Orders</text>
  <text x="315" y="732" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999" text-anchor="middle">Profile</text>
